<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姜涵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background-color: #ededed; /* 微信原生聊天背景色 */
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========== 顶部导航栏 ========== */
        .header {
            background-color: #f7f7f7;
            border-bottom: 1px solid #d9d9d9;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 56px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #e0e0e0;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .contact-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-name {
            font-size: 17px;
            font-weight: 600;
            color: #000;
            line-height: 1.2;
        }

        .contact-status {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 2px;
            transition: opacity 0.3s;
        }

        .typing-status {
            color: #07c160; /* 微信绿 */
            font-weight: 500;
        }

        .more-btn {
            font-size: 20px;
            color: #8e8e93;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .more-btn:hover {
            background-color: #e5e5e5;
        }

        /* ========== 顶部下拉菜单 ========== */
        .dropdown-menu {
            position: absolute;
            top: 56px;
            right: 10px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            width: 140px;
            z-index: 200;
            display: none;
            overflow: hidden;
        }

        .dropdown-menu.show {
            display: block;
        }

        .menu-item {
            padding: 12px 16px;
            font-size: 15px;
            color: #000;
            cursor: pointer;
            transition: background-color 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background-color: #f5f5f5;
        }

        .menu-item.danger {
            color: #ff3b30;
        }

        /* ========== 聊天区域 ========== */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            background-color: #ededed;
            scroll-behavior: smooth;
        }

        /* 居中时间戳 */
        .time-divider {
            text-align: center;
            margin: 16px 0;
            color: #999;
            font-size: 12px;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
            align-items: flex-end;
            gap: 8px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #e0e0e0;
            flex-shrink: 0;
            cursor: pointer;
        }

        .message-content {
            max-width: 72%;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .message.user .message-content {
            align-items: flex-end;
        }

        .bubble {
            padding: 9px 12px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }

        /* 微信原生气泡圆角 */
        .message.assistant .bubble {
            background-color: #fff;
            color: #000;
            border-bottom-left-radius: 4px;
        }

        .message.user .bubble {
            background-color: #95ec69; /* 微信原生绿气泡 */
            color: #000;
            border-bottom-right-radius: 4px;
        }

        /* 消息状态（已发送/已读） */
        .message-status {
            font-size: 11px;
            color: #999;
            align-self: flex-end;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .status-sent::after {
            content: "✓";
        }

        .status-read::after {
            content: "✓✓";
            color: #07c160; /* 微信绿 */
        }

        /* ========== 底部输入区域 ========== */
        .input-container {
            background-color: #f7f7f7;
            border-top: 1px solid #d9d9d9;
            padding: 8px 12px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            min-height: 50px;
        }

        .emoji-btn {
            font-size: 24px;
            cursor: pointer;
            color: #8e8e93;
            padding: 4px;
            margin-bottom: 4px;
        }

        .input-box {
            flex: 1;
            background-color: #fff;
            border: 1px solid #d9d9d9;
            border-radius: 18px;
            padding: 8px 12px;
            font-size: 16px;
            outline: none;
            min-height: 36px;
            max-height: 120px;
            overflow-y: auto;
            resize: none;
            line-height: 1.5;
        }

        .input-box:focus {
            border-color: #07c160; /* 微信绿 */
        }

        .send-btn {
            background-color: #07c160; /* 微信绿 */
            color: #fff;
            border: none;
            border-radius: 18px;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 4px;
            min-width: 60px;
        }

        .send-btn:hover {
            background-color: #06ad56;
        }

        .send-btn:disabled {
            background-color: #d0d0d0;
            cursor: not-allowed;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            display: none;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background-color: #fff;
            border-radius: 12px;
            width: 300px;
            overflow: hidden;
            animation: modalIn 0.2s ease-out;
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            padding: 16px;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            border-bottom: 1px solid #f0f0f0;
        }

        .modal-body {
            padding: 20px 16px;
        }

        .modal-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .modal-input:focus {
            border-color: #07c160; /* 微信绿 */
        }

        .modal-footer {
            display: flex;
            border-top: 1px solid #f0f0f0;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            border: none;
            background: none;
        }

        .modal-btn:hover {
            background-color: #f5f5f5;
        }

        .modal-btn.primary {
            color: #07c160; /* 微信绿 */
            font-weight: 500;
            border-left: 1px solid #f0f0f0;
        }

        .modal-btn.danger {
            color: #ff3b30;
            font-weight: 500;
        }

        /* ========== 滚动条美化 ========== */
        .chat-container::-webkit-scrollbar,
        .input-box::-webkit-scrollbar {
            width: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb,
        .input-box::-webkit-scrollbar-thumb {
            background-color: #c1c1c1;
            border-radius: 2px;
        }

        /* ========== 响应式适配 ========== */
        @media (max-width: 768px) {
            .message-content {
                max-width: 80%;
            }
            
            .modal {
                width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="header">
        <img src="/static/avatar.jpg" alt="姜涵" class="avatar" id="jianghanAvatar">
        <div class="contact-info">
            <div class="contact-name">姜涵</div>
            <div class="contact-status" id="contactStatus">姐姐在这里</div>
        </div>
        <div class="more-btn" id="moreBtn">⋯</div>
        
        <!-- 顶部下拉菜单 -->
        <div class="dropdown-menu" id="dropdownMenu">
            <div class="menu-item" id="setNicknameBtn">设置昵称</div>
            <div class="menu-item danger" id="clearChatBtn">清空对话</div>
        </div>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-container" id="chatContainer"></div>

    <!-- 底部输入区域 -->
    <div class="input-container">
        <div class="emoji-btn">😊</div>
        <textarea class="input-box" id="messageInput" placeholder="跟姐姐说说话…" rows="1"></textarea>
        <button class="send-btn" id="sendButton" disabled>发送</button>
    </div>

    <!-- 设置昵称模态框 -->
    <div class="modal-overlay" id="nicknameModal">
        <div class="modal">
            <div class="modal-header">设置你的昵称</div>
            <div class="modal-body">
                <input type="text" class="modal-input" id="nicknameInput" placeholder="姐姐会这样叫你">
            </div>
            <div class="modal-footer">
                <button class="modal-btn" id="cancelNicknameBtn">取消</button>
                <button class="modal-btn primary" id="confirmNicknameBtn">确定</button>
            </div>
        </div>
    </div>

    <!-- 清空对话确认模态框 -->
    <div class="modal-overlay" id="clearModal">
        <div class="modal">
            <div class="modal-header">清空对话</div>
            <div class="modal-body" style="text-align: center;">确定要清空所有聊天记录吗？</div>
            <div class="modal-footer">
                <button class="modal-btn" id="cancelClearBtn">取消</button>
                <button class="modal-btn danger" id="confirmClearBtn">清空</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 全局变量 ==========
        let userId = localStorage.getItem("jianghan_user_id");
        if (!userId) {
            userId = "user_" + Math.random().toString(36).substr(2, 9);
            localStorage.setItem("jianghan_user_id", userId);
        }

        let userNickname = localStorage.getItem("jianghan_nickname") || "";
        let lastMessageTime = null;
        const TIME_GAP = 5 * 60 * 1000; // 5分钟显示一次时间戳

        // ========== DOM元素 ==========
        const chatContainer = document.getElementById("chatContainer");
        const messageInput = document.getElementById("messageInput");
        const sendButton = document.getElementById("sendButton");
        const contactStatus = document.getElementById("contactStatus");
        const moreBtn = document.getElementById("moreBtn");
        const dropdownMenu = document.getElementById("dropdownMenu");
        const nicknameModal = document.getElementById("nicknameModal");
        const clearModal = document.getElementById("clearModal");
        const nicknameInput = document.getElementById("nicknameInput");
        const jianghanAvatar = document.getElementById("jianghanAvatar");

        // ========== 工具函数 ==========
        function formatTime(date) {
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        function formatDate(date) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const yesterday = new Date(today - 24 * 60 * 60 * 1000);
            
            if (date >= today) {
                return formatTime(date);
            } else if (date >= yesterday) {
                return `昨天 ${formatTime(date)}`;
            } else {
                return `${date.getMonth()+1}月${date.getDate()}日 ${formatTime(date)}`;
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // ========== 正在输入提示 ==========
        function showTyping() {
            contactStatus.textContent = "姐姐正在输入…";
            contactStatus.classList.add("typing-status");
        }

        function hideTyping() {
            contactStatus.textContent = "姐姐在这里";
            contactStatus.classList.remove("typing-status");
        }

        // ========== 添加消息到聊天界面 ==========
        function addMessage(content, role, showStatus = false) {
            const now = new Date();
            
            // 智能显示时间戳（间隔超过5分钟）
            if (!lastMessageTime || now - lastMessageTime > TIME_GAP) {
                const timeDivider = document.createElement("div");
                timeDivider.className = "time-divider";
                timeDivider.textContent = formatDate(now);
                chatContainer.appendChild(timeDivider);
            }
            lastMessageTime = now;

            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement("img");
            avatar.className = "message-avatar";
            if (role === "assistant") {
                avatar.src = jianghanAvatar.src;
            } else {
                avatar.src = "/static/my_avatar.jpg";
            }

            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = content;

            contentDiv.appendChild(bubble);

            // 用户消息显示状态
            if (role === "user" && showStatus) {
                const statusDiv = document.createElement("div");
                statusDiv.className = "message-status status-sent";
                statusDiv.dataset.id = Date.now();
                contentDiv.appendChild(statusDiv);
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);

            chatContainer.appendChild(messageDiv);
            scrollToBottom();

            // 返回状态元素的ID，用于后续更新为已读
            return role === "user" ? contentDiv.querySelector(".message-status")?.dataset.id : null;
        }

        // 更新消息状态为已读
        function updateMessageToRead(statusId) {
            if (!statusId) return;
            const statusEl = document.querySelector(`[data-id="${statusId}"]`);
            if (statusEl) {
                statusEl.classList.remove("status-sent");
                statusEl.classList.add("status-read");
            }
        }

        // ========== 发送消息 ==========
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // 清空输入框
            messageInput.value = "";
            sendButton.disabled = true;
            messageInput.style.height = "auto";

            // 添加用户消息
            const statusId = addMessage(message, "user", true);

            // 显示正在输入
            showTyping();

            try {
                // 模拟打字延迟（增加真实感）
                await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 1200));

                // 调用后端接口
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message,
                        user_id: userId,
                        nickname: userNickname
                    })
                });

                const data = await response.json();
                
                // 隐藏正在输入
                hideTyping();

                // 更新消息为已读
                updateMessageToRead(statusId);

                // 添加姜涵的回复
                addMessage(data.reply, "assistant");

            } catch (error) {
                console.error("发送失败:", error);
                hideTyping();
                addMessage("（姐姐网络有点卡，稍等一下）", "assistant");
            }
        }

        // ========== 清空对话 ==========
        async function clearChat() {
            try {
                await fetch("/clear", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: userId
                    })
                });

                // 清空前端聊天记录
                chatContainer.innerHTML = "";
                lastMessageTime = null;
                clearModal.classList.remove("show");

            } catch (error) {
                console.error("清空失败:", error);
                alert("清空失败，请重试");
            }
        }

        // ========== 事件监听 ==========
        // 发送按钮点击
        sendButton.addEventListener("click", sendMessage);

        // 回车发送
        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 输入框自动调整高度
        messageInput.addEventListener("input", () => {
            messageInput.style.height = "auto";
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + "px";
            sendButton.disabled = !messageInput.value.trim();
        });

        // 顶部更多按钮
        moreBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle("show");
        });

        // 点击空白处关闭菜单
        document.addEventListener("click", () => {
            dropdownMenu.classList.remove("show");
        });

        // 设置昵称
        setNicknameBtn.addEventListener("click", () => {
            dropdownMenu.classList.remove("show");
            nicknameInput.value = userNickname;
            nicknameModal.classList.add("show");
            nicknameInput.focus();
        });

        confirmNicknameBtn.addEventListener("click", () => {
            const newNickname = nicknameInput.value.trim();
            if (newNickname) {
                userNickname = newNickname;
                localStorage.setItem("jianghan_nickname", userNickname);
            }
            nicknameModal.classList.remove("show");
        });

        cancelNicknameBtn.addEventListener("click", () => {
            nicknameModal.classList.remove("show");
        });

        // 清空对话
        clearChatBtn.addEventListener("click", () => {
            dropdownMenu.classList.remove("show");
            clearModal.classList.add("show");
        });

        confirmClearBtn.addEventListener("click", clearChat);

        cancelClearBtn.addEventListener("click", () => {
            clearModal.classList.remove("show");
        });

        // 点击模态框背景关闭
        nicknameModal.addEventListener("click", (e) => {
            if (e.target === nicknameModal) {
                nicknameModal.classList.remove("show");
            }
        });

        clearModal.addEventListener("click", (e) => {
            if (e.target === clearModal) {
                clearModal.classList.remove("show");
            }
        });

        // 页面加载完成后自动聚焦
        window.addEventListener("load", () => {
            messageInput.focus();
            // 如果用户没有设置昵称，自动弹出设置框
            if (!userNickname) {
                setTimeout(() => {
                    nicknameModal.classList.add("show");
                    nicknameInput.focus();
                }, 500);
            }
        });
    </script>
</body>
</html>
